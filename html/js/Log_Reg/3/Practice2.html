<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Filtered Products</h3>
<ul id="output"></ul>

<script>
const products = [
  { name: 'A', price: 50 },
  { name: 'B', price: 150 },
  { name: 'C', price: 200 },
  { name: 'D', price: 80 }
];

const result = products
  .filter(p => p.price > 100)
  .map(p => p.name);

// Display in UI
const ul = document.getElementById('output');

result.forEach(name => {
  const li = document.createElement('li');
  li.textContent = name;
  ul.appendChild(li);
});
</script>
</body>
</html>
