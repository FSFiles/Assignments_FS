<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <form id="forming" class="bg-blue-300 w-325 h-300 rounded-lg flex flex-col items-center  gap-1 p-40">
        <div class="bg-blue-700 border-2 rounded-md p-7 flex flex-col items-center ">
        <input type="text" name="username" id="username" placeholder="Username" style="border:2px solid #c22f2f;" class="bg-blue text-color-white "><br>
        <input type="email" name="email" id="email" placeholder="Email" style="border:2px solid #c22f2f;" class="bg-blue text-color-white"><br>
        <input type="password" name="password" id="password" placeholder="Password" style="border:2px solid #c22f2f;" class="bg-blue text-color-white"><br>
        <button id="btn" class="bg-red-400 rounded-md p-2">Register</button>
        </div>
    </form>

    <script src="data.js"></script>
</body>
</html>
