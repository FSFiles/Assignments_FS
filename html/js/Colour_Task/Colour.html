<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Signal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <input type="text" id="colorInput" placeholder="Type STOP or WAIT or GO" class="mb-6 p-2 rounded text-center text-black w-80"/>

    <div id="box" 
        class="w-32 h-32 rounded-full bg-red-500 flex items-center justify-center text-white text-xl opacity-30 transition mb-9">
        STOP
    </div>

        <div id="box1" 
            class="w-32 h-32 rounded-full bg-yellow-400 flex items-center justify-center text-black text-xl opacity-30 transition mb-9">
            WAIT
        </div>

        <div id="box2" 
            class="w-32 h-32 rounded-full bg-green-500 flex items-center justify-center text-white text-xl opacity-30 transition mb-9">
            GO
        </div>

    </div>

    <script src="color.js"></script>

</body>
</html>

<script src="js/color.js"></script>
</body>
</html>
